<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>City Dental Practice</title>
  <script>
    // GitHub Pages SPA redirect — encodes the full path into a query string
    // and sends the browser back to index.html so the React router can handle it.
    // pathSegmentsToKeep = 1 because the repo lives at /Dental-Practice/
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
